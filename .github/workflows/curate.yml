name: Curate news feed

on:
  schedule:
    # Every 6 hours, on the hour, UTC. Note: GitHub Actions cron has up
    # to ~15min of delay during peak times — that's fine for a 6h cadence.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run curator
        id: curate
        run: python scripts/curate.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- articles.json; then
            echo "No changes to articles.json — nothing to commit."
            exit 0
          fi
          git config user.name 'credit-caddy-bot'
          git config user.email 'bot@credit-caddy.local'
          git add articles.json
          git commit -m "chore: refresh feed (total=${{ steps.curate.outputs.total }}, added=${{ steps.curate.outputs.added }}, pruned=${{ steps.curate.outputs.pruned }})"
          git push
